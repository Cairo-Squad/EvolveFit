name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Install iOS 18.3.1 Simulator Runtime
        run: |
          echo "Installing iOS 18.3.1 simulator runtime..."
          xcversion simulators --install='iOS 18.3.1' || echo "iOS 18.3.1 not available, using default simulators"

      - name: List available schemes
        run: |
          echo "Listing project schemes and targets..."
          xcodebuild -project iosApp/iosApp.xcodeproj -list
          echo "Project listing complete."

      - name: Resolve Swift Package Dependencies
        run: |
          echo "Resolving Swift Package dependencies..."
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -resolvePackageDependencies
          echo "Package dependencies resolved."

      - name: Build iOS App for Simulator
        run: |
          echo "Starting iOS build..."
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | awk '{for(i=2;i<=NF-2;i++) printf $i " "; print ""}' | sed 's/ $//')
          SIMULATOR_OS=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | grep -o "iOS [0-9]*\.[0-9]*\.[0-9]*" | awk '{print $2}')
          if [ -z "$SIMULATOR" ] || [ -z "$SIMULATOR_OS" ]; then
            echo "Error: No available iPhone simulator found."
            exit 1
          fi
          echo "Using simulator: $SIMULATOR with iOS $SIMULATOR_OS"
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=$SIMULATOR_OS" \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Upload iOS App Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-simulator
          path: build/Build/Products/Debug-iphonesimulator/*.app