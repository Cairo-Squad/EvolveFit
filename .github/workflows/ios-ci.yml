name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: |
          echo "Listing available simulators..."
          xcrun simctl list devices available
          echo "Available simulators listed."

      - name: List available schemes
        run: |
          echo "Listing project schemes and targets..."
          xcodebuild -project iosApp/iosApp.xcodeproj -list
          echo "Project listing complete."

      - name: Resolve Swift Package Dependencies
        run: |
          echo "Resolving Swift Package dependencies..."
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -resolvePackageDependencies
          echo "Package dependencies resolved."

      - name: Build iOS App for Simulator
        run: |
          echo "Starting iOS build..."
          # Capture the full simulator list for debugging
          xcrun simctl list devices available > simulator_list.txt
          cat simulator_list.txt
          # Extract the iPhone 16 Pro for the earliest available iOS version
          FULL_LINE=$(xcrun simctl list devices available | awk '/-- iOS / {os = $3} /iPhone 16 Pro/ {print os " " $0; exit}')
          if [ -z "$FULL_LINE" ]; then
            echo "Warning: No iPhone 16 Pro found. Falling back to iPhone 16 with iOS 18.4."
            SIMULATOR="iPhone 16"
            SIMULATOR_OS="18.4"
            SIMULATOR_ID="2AA11C3D-8059-44EC-B69A-CCDD9139A4A9"
          else
            SIMULATOR_OS=$(echo "$FULL_LINE" | awk '{print $1}')
            SIMULATOR=$(echo "$FULL_LINE" | awk '{print $2 " " $3 " " $4}')
            SIMULATOR_ID=$(echo "$FULL_LINE" | grep -o '([0-9A-F-]\+)' | tr -d '()')
            echo "Using simulator: $SIMULATOR with iOS $SIMULATOR_OS (ID: $SIMULATOR_ID)"
          fi
          # Boot the simulator to ensure it's available
          echo "Booting simulator $SIMULATOR (ID: $SIMULATOR_ID)..."
          xcrun simctl boot "$SIMULATOR_ID" || echo "Simulator already booted or failed to boot, proceeding with build."
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=$SIMULATOR_OS" \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Upload iOS App Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-simulator
          path: build/Build/Products/Debug-iphonesimulator/*.app