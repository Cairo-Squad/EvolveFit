name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS 18.2 Simulator Runtime
        run: |
          echo "Installing iOS 18.2 simulator runtime..."
          xcversion simulators --install='iOS 18.2' || echo "Failed to install iOS 18.2, using available simulators"

      - name: Show available simulators
        run: |
          echo "Listing available simulators..."
          xcrun simctl list devices available
          echo "Available simulators listed."

      - name: List available schemes
        run: |
          echo "Listing project schemes and targets..."
          xcodebuild -project iosApp/iosApp.xcodeproj -list
          echo "Project listing complete."

      - name: Resolve Swift Package Dependencies
        run: |
          echo "Resolving Swift Package dependencies..."
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -resolvePackageDependencies
          echo "Package dependencies resolved."

      - name: Build iOS App for Simulator
        run: |
          echo "Starting iOS build..."
          # Capture the full simulator list for debugging
          xcrun simctl list devices available > simulator_list.txt
          cat simulator_list.txt
          # Extract the first available iPhone simulator, its ID, and iOS version for iOS 18.2
          SIMULATOR_LINE=$(xcrun simctl list devices available | grep -E "iPhone.*\([0-9A-F-]+\)" | grep "iOS 18.2" | head -n 1)
          SIMULATOR=$(echo "$SIMULATOR_LINE" | sed -E 's/.*iPhone ([^ ]+).*/\1/' | tr -d '[:space:]')
          SIMULATOR_OS=$(echo "$SIMULATOR_LINE" | grep -oE "iOS [0-9]+\.[0-9]+(\.[0-9]+)?" | awk '{print $2}' | tr -d '[:space:]')
          SIMULATOR_ID=$(echo "$SIMULATOR_LINE" | grep -oE "\([0-9A-F-]+\)" | tr -d '()')
          if [ -z "$SIMULATOR" ] || [ -z "$SIMULATOR_OS" ] || [ -z "$SIMULATOR_ID" ]; then
            echo "Warning: No available iPhone simulator found for iOS 18.2. Falling back to iPhone 16 Pro with iOS 18.2."
            SIMULATOR="iPhone 16 Pro"
            SIMULATOR_OS="18.2"
            SIMULATOR_ID=""
          else
            echo "Using simulator: $SIMULATOR with iOS $SIMULATOR_OS (ID: $SIMULATOR_ID)"
          fi
          # Boot the simulator if ID is available
          if [ -n "$SIMULATOR_ID" ]; then
            echo "Booting simulator $SIMULATOR (ID: $SIMULATOR_ID)..."
            xcrun simctl boot "$SIMULATOR_ID" || echo "Simulator already booted or failed to boot, proceeding with build."
          fi
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=$SIMULATOR_OS" \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Upload iOS App Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-simulator
          path: build/Build/Products/Debug-iphonesimulator/*.app